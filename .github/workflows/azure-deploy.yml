name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: smartpark-api
  DOTNET_VERSION: 8.0.x
  PUBLISH_DIR: ./publish

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore SmartPark.sln

      - name: Build
        run: dotnet build SmartPark.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SmartPark.sln --configuration Release --no-build

      - name: Publish API
        run: dotnet publish src/SmartPark.Api/SmartPark.Api.csproj --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
