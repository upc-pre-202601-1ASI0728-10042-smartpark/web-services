name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SmartPark.sln

      - name: Build
        run: dotnet build SmartPark.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SmartPark.sln --configuration Release --no-build --verbosity normal
